<h1>References</h1>


<ul>
    <li><a href="https://developer.mozilla.org/en-US/docs/Web/HTTP">MDN HTTP Docs</a></li>
    <li><a href="https://www.cloudflare.com/learning/ddos/glossary/hypertext-transfer-protocol-http/">Cloudflare HTTP Guide</a></li>
    <li><a href="https://www.w3.org/Protocols/">W3C Protocols</a></li>
</ul>

<script>
const toggle = document.getElementById('darkModeToggle');

// Activate dark mode if active already
if(localStorage.getItem('darkMode') === 'enabled'){
    document.body.classList.add('dark-mode');
}

// Toggle dark mode if button is clicked
toggle.addEventListener('click', () => {
    document.body.classList.toggle('dark-mode');

    if(document.body.classList.contains('dark-mode')){
        localStorage.setItem('darkMode', 'enabled');
    } else {
    localStorage.setItem('darkMode', 'disabled');
    }
});
</script>
